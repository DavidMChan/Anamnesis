services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-arena}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
    ports:
      - "127.0.0.1:5672:5672"   # AMQP - localhost only
      - "127.0.0.1:15672:15672" # Management UI - localhost only (access via SSH tunnel)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  dispatcher:
    build: ./worker
    command: python -m src.dispatcher
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?SUPABASE_SERVICE_KEY is required}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-arena}:${RABBITMQ_PASS}@rabbitmq:5672

  worker:
    build: ./worker
    command: python main.py
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-arena}:${RABBITMQ_PASS}@rabbitmq:5672
      - WASABI_ACCESS_KEY_ID=${WASABI_ACCESS_KEY_ID}
      - WASABI_SECRET_ACCESS_KEY=${WASABI_SECRET_ACCESS_KEY}
      - WASABI_BUCKET=${WASABI_BUCKET}
      - WASABI_REGION=${WASABI_REGION:-us-west-2}
      - WASABI_ENDPOINT=${WASABI_ENDPOINT:-https://s3.wasabisys.com}
    deploy:
      # Concurrency is controlled per-run via max_concurrent_tasks in Settings.
      # PREFETCH_COUNT controls RabbitMQ prefetch (operational tuning).
      replicas: 1

volumes:
  rabbitmq_data:
