name: Worker Tests

on:
  pull_request:
    paths:
      - 'worker/**'
      - '.github/workflows/test-worker.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: cd worker && pip install -r requirements.txt

      - name: Run tests
        run: cd worker && pytest --tb=short
